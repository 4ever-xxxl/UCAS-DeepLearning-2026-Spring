target-version = "py313"
line-length = 120

[lint]
select = ["E4", "E7", "E9", "F", "I", "N", "UP", "W"]
ignore = ["N812"]

[lint.per-file-ignores]
"__init__.py" = ["F401"]
"experiment*/train_*.py" = ["N806"]
"experiment*/generate_*.py" = ["N806"]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"